<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22313f"/>
    </marker>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; fill: #15202b; }
      .box-title { font: 700 18px 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; fill: #15202b; }
      .box-text { font: 14px 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; fill: #34495e; }
      .small { font: 12px 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; fill: #5d6d7e; }
      .shape { stroke: #22313f; stroke-width: 1.5; rx: 16; ry: 16; }
      .input { fill: #eaf4ff; }
      .feature { fill: #edf7ed; }
      .phase { fill: #fff3d9; }
      .proto { fill: #f2eafa; }
      .contrast { fill: #fdecea; }
      .head { fill: #eaf7f7; }
      .loss { fill: #f7f7f7; }
      .arrow { stroke: #22313f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #697b8c; stroke-width: 1.6; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="940" fill="#fbfcfd"/>
  <text x="750" y="54" text-anchor="middle" class="title">基于软阶段原型对比的学生运动动作错误识别模型结构图</text>

  <rect x="50" y="105" width="220" height="100" class="shape input"/>
  <text x="160" y="138" text-anchor="middle" class="box-title">学生运动视频</text>
  <text x="160" y="166" text-anchor="middle" class="box-text">帧文件夹 / RGB clips</text>
  <text x="160" y="188" text-anchor="middle" class="small">T × [B,3,H,W]</text>

  <rect x="330" y="105" width="250" height="100" class="shape feature"/>
  <text x="455" y="136" text-anchor="middle" class="box-title">时序特征提取模块</text>
  <text x="455" y="164" text-anchor="middle" class="box-text">X3D / Action-Slot Backbone</text>
  <text x="455" y="186" text-anchor="middle" class="small">输出 F: B × T' × C</text>

  <rect x="650" y="105" width="250" height="100" class="shape phase"/>
  <text x="775" y="136" text-anchor="middle" class="box-title">软动作阶段划分</text>
  <text x="775" y="164" text-anchor="middle" class="box-text">Learnable Phase Queries</text>
  <text x="775" y="186" text-anchor="middle" class="small">A: B × K × T'</text>

  <rect x="980" y="105" width="220" height="100" class="shape phase"/>
  <text x="1090" y="138" text-anchor="middle" class="box-title">学生阶段特征</text>
  <text x="1090" y="166" text-anchor="middle" class="box-text">加权时序池化</text>
  <text x="1090" y="188" text-anchor="middle" class="small">S: B × K × C</text>

  <rect x="50" y="305" width="220" height="96" class="shape input"/>
  <text x="160" y="338" text-anchor="middle" class="box-title">动作类别 ID</text>
  <text x="160" y="366" text-anchor="middle" class="box-text">action_id</text>
  <text x="160" y="388" text-anchor="middle" class="small">B</text>

  <rect x="330" y="285" width="250" height="135" class="shape proto"/>
  <text x="455" y="318" text-anchor="middle" class="box-title">正确动作阶段原型库</text>
  <text x="455" y="346" text-anchor="middle" class="box-text">CorrectActionPrototypeBank</text>
  <text x="455" y="371" text-anchor="middle" class="box-text">按 action_id 取标准阶段原型</text>
  <text x="455" y="396" text-anchor="middle" class="small">P: B × K × C</text>

  <rect x="650" y="285" width="290" height="135" class="shape contrast"/>
  <text x="795" y="318" text-anchor="middle" class="box-title">阶段级偏差对比模块</text>
  <text x="795" y="348" text-anchor="middle" class="box-text">concat(S, P, |S-P|, S*P)</text>
  <text x="795" y="374" text-anchor="middle" class="box-text">显式建模学生动作与标准动作差异</text>
  <text x="795" y="398" text-anchor="middle" class="small">D: B × K × 4C</text>

  <rect x="1030" y="275" width="250" height="105" class="shape head"/>
  <text x="1155" y="308" text-anchor="middle" class="box-title">阶段错误识别头</text>
  <text x="1155" y="337" text-anchor="middle" class="box-text">Phase Error Head</text>
  <text x="1155" y="360" text-anchor="middle" class="small">phase_logits: B × K × E</text>

  <rect x="1030" y="430" width="250" height="105" class="shape head"/>
  <text x="1155" y="463" text-anchor="middle" class="box-title">视频错误识别头</text>
  <text x="1155" y="492" text-anchor="middle" class="box-text">Video Error Head</text>
  <text x="1155" y="515" text-anchor="middle" class="small">logits: B × E</text>

  <rect x="1325" y="430" width="135" height="105" class="shape loss"/>
  <text x="1392" y="464" text-anchor="middle" class="box-title">错误标签</text>
  <text x="1392" y="492" text-anchor="middle" class="box-text">BCE Loss</text>
  <text x="1392" y="515" text-anchor="middle" class="small">multi-label</text>

  <rect x="1030" y="620" width="250" height="115" class="shape loss"/>
  <text x="1155" y="654" text-anchor="middle" class="box-title">训练目标</text>
  <text x="1155" y="683" text-anchor="middle" class="box-text">视频级错误分类损失</text>
  <text x="1155" y="707" text-anchor="middle" class="box-text">阶段级辅助错误损失</text>
  <text x="1155" y="729" text-anchor="middle" class="small">可选：阶段监督 / 原型紧致损失</text>

  <rect x="210" y="590" width="290" height="145" class="shape proto"/>
  <text x="355" y="623" text-anchor="middle" class="box-title">正确动作原型构建流程</text>
  <text x="355" y="653" text-anchor="middle" class="box-text">仅使用 is_correct=true 样本</text>
  <text x="355" y="679" text-anchor="middle" class="box-text">同一特征提取与软阶段划分</text>
  <text x="355" y="705" text-anchor="middle" class="box-text">按 action_id 对阶段特征求均值</text>
  <text x="355" y="727" text-anchor="middle" class="small">保存 correct_prototypes.pth</text>

  <rect x="580" y="590" width="300" height="145" class="shape proto"/>
  <text x="730" y="623" text-anchor="middle" class="box-title">原型张量</text>
  <text x="730" y="653" text-anchor="middle" class="box-text">num_actions × K × C</text>
  <text x="730" y="681" text-anchor="middle" class="box-text">表示每个动作每个阶段的正确特征</text>
  <text x="730" y="707" text-anchor="middle" class="box-text">可离线构建或作为可学习参数</text>

  <line x1="270" y1="155" x2="330" y2="155" class="arrow"/>
  <line x1="580" y1="155" x2="650" y2="155" class="arrow"/>
  <line x1="900" y1="155" x2="980" y2="155" class="arrow"/>
  <line x1="270" y1="353" x2="330" y2="353" class="arrow"/>
  <line x1="580" y1="353" x2="650" y2="353" class="arrow"/>
  <path d="M1090 205 C1090 250, 895 250, 840 285" class="arrow"/>
  <line x1="940" y1="327" x2="1030" y2="327" class="arrow"/>
  <path d="M940 382 C990 382, 990 482, 1030 482" class="arrow"/>
  <line x1="1280" y1="482" x2="1325" y2="482" class="arrow"/>
  <path d="M1155 535 L1155 620" class="arrow"/>
  <path d="M1155 380 C1155 470, 1155 535, 1155 620" class="dash"/>
  <path d="M500 663 L580 663" class="arrow"/>
  <path d="M730 590 C730 515, 455 515, 455 420" class="dash"/>

  <text x="750" y="815" text-anchor="middle" class="box-title">核心创新链路</text>
  <text x="750" y="850" text-anchor="middle" class="box-text">动作槽/时序特征 → 软阶段划分 → 正确动作阶段原型库 → 阶段级偏差对比 → 错误类别与错误阶段识别</text>
  <text x="750" y="882" text-anchor="middle" class="small">对应代码：models/phase_contrast_model.py, models/soft_phase.py, models/prototype_bank.py</text>
</svg>
